<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Save the Date – Saskia & Maxime</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      background: #f0ede8;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      font-family: sans-serif;
    }

    .card {
      position: relative;
      width: 390px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.15);
      border-radius: 3px;
      overflow: hidden;
    }

    .card img {
      width: 100%;
      display: block;
    }

    #scratchWrap {
      position: absolute;
      left:   21.71%;
      top:    76.91%;
      width:  56.59%;
      height: 15.65%;
      cursor: crosshair;
    }

    #scratchCanvas {
      position: absolute;
      inset: 0;
      border-radius: 4px;
    }

    .confetti-wrap {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 998;
    }

    /* ── POP-UP ── */
    #popup {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 1000;
      background: rgba(0,0,0,0.55);
      align-items: center;
      justify-content: center;
    }
    #popup.show { display: flex; }

    .popup-box {
      background: #fff;
      border-radius: 6px;
      padding: 36px 32px 28px;
      max-width: 320px;
      width: 90%;
      text-align: center;
      box-shadow: 0 24px 64px rgba(0,0,0,0.25);
      animation: popIn 0.4s cubic-bezier(.34,1.56,.64,1) both;
    }

    @keyframes popIn {
      from { transform: scale(0.7); opacity: 0; }
      to   { transform: scale(1);   opacity: 1; }
    }

    .popup-hearts { font-size: 32px; margin-bottom: 12px; }

    .popup-title {
      font-family: Georgia, serif;
      font-size: 22px;
      color: #1a1a1a;
      margin-bottom: 8px;
      font-style: italic;
    }

    .popup-sub {
      font-size: 12px;
      color: #999;
      letter-spacing: 0.1em;
      margin-bottom: 28px;
      line-height: 1.6;
    }

    .btn-save {
      display: block;
      width: 100%;
      padding: 14px 0;
      background: #1a1a1a;
      color: #fff;
      font-size: 12px;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      text-decoration: none;
      border-radius: 3px;
      margin-bottom: 12px;
      cursor: pointer;
      border: none;
      transition: background 0.2s;
    }
    .btn-save:hover { background: #333; }

    .btn-close {
      font-size: 11px;
      color: #bbb;
      cursor: pointer;
      letter-spacing: 0.1em;
      text-decoration: underline;
      background: none;
      border: none;
    }
  </style>
</head>

  <div id="scratchWrap">
    <canvas id="scratchCanvas"></canvas>
  </div>
</div>

<div class="confetti-wrap" id="confettiWrap"></div>

<div id="popup">
  <div class="popup-box">
    <div class="popup-hearts">💍🤍</div>
    <div class="popup-title">Saskia & Maxime</div>
    <div class="popup-sub">
      15. Mai 2027 · Kelmis<br><br>
      Speicher die Karte in deiner Galerie!
    </div>
    <button class="btn-save" onclick="saveImage()">↓ Karte speichern</button>
    <button class="btn-close" onclick="document.getElementById('popup').classList.remove('show')">Schließen</button>
  </div>
</div>

<script>
  const wrap   = document.getElementById('scratchWrap');
  const canvas = document.getElementById('scratchCanvas');
  const ctx    = canvas.getContext('2d');
  let isDrawing = false;
  let revealed  = false;

  // Bild als Blob für Download vorbereiten
  function saveImage() {
    const img = document.getElementById('cardImg');
    const a = document.createElement('a');
    a.href = img.src;
    a.download = 'SaveTheDate_Saskia_Maxime.jpg';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
  }

  function initCanvas() {
    canvas.width  = wrap.offsetWidth;
    canvas.height = wrap.offsetHeight;

    const grad = ctx.createLinearGradient(0, 0, canvas.width, canvas.height);
    grad.addColorStop(0,   '#c5bfb9');
    grad.addColorStop(0.5, '#dbd6d0');
    grad.addColorStop(1,   '#b8b2ac');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    ctx.strokeStyle = 'rgba(255,255,255,0.15)';
    ctx.lineWidth = 1;
    for (let i = 0; i < canvas.width; i += 4) {
      ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, canvas.height); ctx.stroke();
    }

    ctx.fillStyle = 'rgba(255,255,255,0.6)';
    ctx.font = `bold ${Math.max(9, canvas.height * 0.18)}px sans-serif`;
    ctx.textAlign = 'center';
    ctx.fillText('HIER RUBBELN ✦', canvas.width / 2, canvas.height / 2 + 4);
  }

  function scratch(x, y) {
    ctx.globalCompositeOperation = 'destination-out';
    ctx.beginPath();
    ctx.arc(x, y, canvas.height * 0.28, 0, Math.PI * 2);
    ctx.fill();
    checkReveal();
  }

  function checkReveal() {
    if (revealed) return;
    const data = ctx.getImageData(0, 0, canvas.width, canvas.height).data;
    let cleared = 0;
    for (let i = 3; i < data.length; i += 4) if (data[i] === 0) cleared++;
    if (cleared / (canvas.width * canvas.height) > 0.55) {
      revealed = true;
      canvas.style.transition = 'opacity 0.7s';
      canvas.style.opacity = '0';
      launchConfetti();
      // Pop-up nach Konfetti
      setTimeout(() => {
        document.getElementById('popup').classList.add('show');
      }, 1500);
    }
  }

  function getPos(e) {
    const r = canvas.getBoundingClientRect();
    const s = e.touches ? e.touches[0] : e;
    return { x: s.clientX - r.left, y: s.clientY - r.top };
  }

  canvas.addEventListener('mousedown',  e => { isDrawing = true; scratch(...Object.values(getPos(e))); });
  canvas.addEventListener('mousemove',  e => { if (isDrawing) scratch(...Object.values(getPos(e))); });
  canvas.addEventListener('mouseup',    () => isDrawing = false);
  canvas.addEventListener('mouseleave', () => isDrawing = false);
  canvas.addEventListener('touchstart', e => { e.preventDefault(); isDrawing = true; scratch(...Object.values(getPos(e))); }, { passive: false });
  canvas.addEventListener('touchmove',  e => { e.preventDefault(); if (isDrawing) scratch(...Object.values(getPos(e))); }, { passive: false });
  canvas.addEventListener('touchend',   () => isDrawing = false);

  function launchConfetti() {
    const container = document.getElementById('confettiWrap');
    const colors = ['#c9bfb4','#8a7f74','#1a1a1a','#e0d8cf','#d4c5b0'];
    for (let i = 0; i < 80; i++) {
      const el = document.createElement('div');
      el.style.cssText = `
        position:absolute;
        width:${4+Math.random()*6}px; height:${4+Math.random()*6}px;
        left:${Math.random()*100}%; top:${-10-Math.random()*10}%;
        background:${colors[Math.floor(Math.random()*colors.length)]};
        border-radius:${Math.random()>.5?'50%':'0'};
        transform:rotate(${Math.random()*360}deg);
        animation:fall ${1.2+Math.random()*1.2}s ease-in ${Math.random()*.6}s forwards;
        opacity:0;`;
      container.appendChild(el);
    }
  }

  const s = document.createElement('style');
  s.textContent = `@keyframes fall {
    0%   { transform:translateY(0) rotate(0deg); opacity:1; }
    100% { transform:translateY(100vh) rotate(720deg); opacity:0; }
  }`;
  document.head.appendChild(s);

  initCanvas();
  window.addEventListener('resize', initCanvas);
</script>
